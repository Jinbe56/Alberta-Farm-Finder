{% extends 'base.html' %}

{% block title %}Log in{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <h1>Welcome back</h1>
    <p class="auth-sub">Log in to manage your farm listings and reviews.</p>

    <form method="post" class="auth-form">
      {% csrf_token %}
      <div class="form-group">
        <label for="id_username">Username</label>
        <input type="text" name="username" id="id_username" required autofocus placeholder="Your username">
      </div>
      <div class="form-group">
        <label for="id_password">Password</label>
        <input type="password" name="password" id="id_password" required placeholder="Your password">
      </div>
      <button type="submit" class="btn-primary btn-full">Log in</button>
    </form>

    <p class="auth-switch">Don't have an account? <a href="/register/">Register</a></p>
  </div>
</div>
{% endblock %}
